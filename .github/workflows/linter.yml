name: linter

on:
  push:
    branches: [master]
    paths:
      - '**/*.go'

  pull_request:
    branches: [master]
    paths:
      - '**/*.go'

permissions: # Đã thêm dấu ':' bị thiếu ở đây
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26' # Ép cứng dùng Go 1.26 thay vì stable (để tránh bị GitHub lấy nhầm bản cũ)
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest # Dùng bản mới nhất để tương thích trọn vẹn với Go 1.26