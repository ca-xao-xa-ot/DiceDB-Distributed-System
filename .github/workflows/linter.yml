name: linter

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true # Bật cache để các lần chạy sau không phải tải lại Go từ đầu

      - name: Install and Run golangci-lint
        run: |
          # Ép hệ thống tự biên dịch linter bằng chính Go 1.26 vừa cài ở trên
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout=5m