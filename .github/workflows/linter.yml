name: linter

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download Dependencies and Run Vet
        env:
          # Gọi thẻ căn cước tự động của GitHub ra để sử dụng
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Bơm Token vào Git để vượt qua rào cản đòi hỏi Username/Password
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          
          # Đánh dấu các repo của nhóm là mã nguồn nội bộ (Private) để Go không bị chặn
          export GOPRIVATE=github.com/dicedb/*
          
          # Tìm và chạy linter cho toàn bộ dự án
          for mod in $(find . -name "go.mod"); do
            dir=$(dirname "$mod")
            echo "==== Đang tải thư viện và kiểm tra tại: $dir ===="
            
            cd "$dir"
            go mod tidy
            go vet ./...
            cd - > /dev/null
          done