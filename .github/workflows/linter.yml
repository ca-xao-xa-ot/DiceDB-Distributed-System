name: linter

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true 

      - name: Install and Run golangci-lint
        run: |
          # Tải và tự biên dịch linter bằng Go 1.26
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          
          # Gọi đích danh file vừa build trong GOPATH để loại bỏ bản cũ của GitHub
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m