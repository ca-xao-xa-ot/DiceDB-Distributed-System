name: linter

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Khớp chính xác với đời Go 1.24 trên máy của bạn
          cache: false       # Tắt cache để xóa sạch các lỗi cấu hình cũ

      - name: Run Go Vet
        run: |
          for mod in $(find . -name "go.mod"); do
            dir=$(dirname "$mod")
            echo "==== Kiểm tra thư mục: $dir ===="
            cd "$dir"
            go mod tidy
            go vet ./...
            cd - > /dev/null
          done