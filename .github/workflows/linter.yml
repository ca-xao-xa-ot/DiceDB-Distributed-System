name: linter

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download Dependencies and Run Vet
        run: |
          # Tìm tất cả các thư mục chứa file go.mod trong dự án
          for mod in $(find . -name "go.mod"); do
            dir=$(dirname "$mod")
            echo "==== Đang tải thư viện và kiểm tra tại: $dir ===="
            
            # Chui vào đúng thư mục chứa code
            cd "$dir"
            
            # Tải thư viện và chạy linter chính chủ
            go mod tidy
            go vet ./...
            
            # Thoát ra ngoài để tiếp tục vòng lặp (nếu có nhiều dự án con)
            cd - > /dev/null
          done