name: linter

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run Native Go Linter (Vet and Fmt)
        run: |
          # Kiểm tra lỗi logic, khai báo biến, và tối ưu code bằng công cụ chính chủ Go 1.26
          go vet ./...