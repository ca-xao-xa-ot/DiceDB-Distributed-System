name: linter

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run Go Vet
        run: |
          # Tự động tìm và chạy kiểm tra ở mọi thư mục có file go.mod
          for mod in $(find . -name "go.mod"); do
            dir=$(dirname "$mod")
            echo "==== Kiểm tra thư mục: $dir ===="
            cd "$dir"
            go mod tidy
            go vet ./...
            cd - > /dev/null
          done